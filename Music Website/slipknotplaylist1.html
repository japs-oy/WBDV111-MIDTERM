<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slipknot Playlist</title>
    <link rel="stylesheet" href="css/playlist1.css">
</head>
<body>
    
    <nav class="navbar">
    <a href="login1.html" class="back-btn">Home</a>
    </nav>

    <section class="playlist-header">
        <img src="images/slipknot.jpg" class="playlist-cover">

        <div class="playlist-info">
            <p class="playlist-type">Playlist</p>
            <h1>Slipknot Essentials</h1>
            <p class="playlist-desc">Tracks from Slipknot.</p>
        </div>
    </section>

    <section class="song-list">

        <div class="song-row">
            <span class="song-number">1</span>
            <div class="song-details">
                <h4>Duality</h4>
                <p>Slipknot</p>

            <audio controls>
            <source src="music/duality.mp3" type="audio/mpeg">
            </audio>
            </div>
        </div>

        <div class="song-row">
            <span class="song-number">2</span>
            <div class="song-details">
                <h4>Psychosocial</h4>
                <p>Slipknot</p>

            <audio controls>
            <source src="music/psychosocial.mp3" type="audio/mpeg">
            </audio>
            </div>
        </div>

        <div class="song-row">
            <span class="song-number">3</span>
            <div class="song-details">
                <h4>Before I Forget</h4>
                <p>Slipknot</p>

            <audio controls>
            <source src="music/beforeiforget.mp3" type="audio/mpeg">
            </audio>
            </div>
        </div>

    </section>

</body>
</html>
