<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <p class="nav-logo">🎵 JuiceBoxMusic 🎵</p>
            <ul class="nav-menu">
                <li><a href="login1.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="logo-icon">🎵🎵🎵</div>
                <h1>JuiceBox<span>Music</span></h1>
                <p>Log in to the beat.</p>
            </div>

            <form>
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>
                
                <a href="login1.html">
                <button type="button" class="login-btn">Sign In <br> (still in development)</button>
                </a>

                <div class="footer-links">
                    <a href="login1.html">No passwords yet!</a>
                    <div class="divider"></div>
                    <span>Meanwhile, <a href="login1.html" class="signup">Try our site for free!</a></span>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
